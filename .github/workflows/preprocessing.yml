name: Automated Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy scikit-learn joblib

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_Ahmad-Rizki-Sabani.py

      - name: Upload Preprocessing Result
        uses: actions/upload-artifact@v4
        with:
          name: data-preprocessing
          path: preprocessing/data_preprocessing.csv

      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add preprocessing/data_preprocessing.csv
          git diff --staged --quiet || git commit -m "Update preprocessed dataset"
          git push